syntax = "proto3";

package types.v1;

option go_package = "github.com/nullableocean/grpcservices/api/gen/types/v1;typesv1";

enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    ORDER_TYPE_BUY = 1;
    ORDER_TYPE_SELL = 2;
}

enum OrderStatus {
    ORDER_STATUS_UNSPECIFIED = 0;
    ORDER_STATUS_CREATED = 1;   
    ORDER_STATUS_PENDING = 2;
    ORDER_STATUS_COMPLETED = 3;  
    ORDER_STATUS_REJECTED = 4;
}

enum UserRole {
    USER_ROLE_UNSPECIFIED = 0;
    USER_ROLE_GUEST = 1;
    USER_ROLE_VERIFIED = 2;
    USER_ROLE_SELLER = 3;
    USER_ROLE_MODER = 4;
    USER_ROLE_ADMIN = 5;  
}