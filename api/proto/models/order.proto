syntax = "proto3";

package models.v1;

option go_package = "github.com/nullableocean/grpcservices/api/gen/models/v1;modelsv1";

import "google/protobuf/timestamp.proto";
import "models/money.proto";
import "models/decimal.proto";

message Order {
    string order_uuid = 1;
    string user_uuid = 2;
    string market_uuid = 3;
    OrderType type = 4;
    OrderStatus status = 5;
    OrderSide side = 6;
    Money price = 7;
    Decimal quantity = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
  ORDER_TYPE_STOP_LOSS = 3;
  ORDER_TYPE_TAKE_PROFIT = 4;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_CREATED = 1;
  ORDER_STATUS_PENDING = 2;
  ORDER_STATUS_COMPLETED = 3;
  ORDER_STATUS_CANCELLED = 4;
  ORDER_STATUS_REJECTED = 5;
}
