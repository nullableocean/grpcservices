syntax = "proto3";

package spot.v1;

option go_package = "github.com/nullableocean/grpcservices/api/gen/spot/v1;spotv1";

import "models/user.proto";

service SpotInstrument {
    rpc ViewMarkets(ViewMarketsRequest) returns (ViewMarketsResponse);
    rpc FindMarket(FindMarketRequest) returns (FindMarketResponse);
}

message ViewMarketsResponse {
    repeated Market markets = 1;
}

message ViewMarketsRequest {
    repeated models.v1.UserRole user_roles = 1;
}

message FindMarketRequest {
    string market_uuid = 1;
    repeated models.v1.UserRole user_roles = 2;
}

message FindMarketResponse {
    Market market = 1;
}

message Market {
    string uuid = 1; //uuid
}
