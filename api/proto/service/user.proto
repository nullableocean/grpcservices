syntax = "proto3";

package user.v1;

option go_package = "github.com/nullableocean/grpcservices/api/gen/user/v1;userv1";

import "types/user.proto";

service User {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc GetUserRoles(UserRolesRequest) returns (UserRolesResponse);
}

message UserRolesRequest {
    string user_uuid = 1; //uuid
}

message UserRolesResponse {
   repeated types.v1.UserRole user_roles = 1;
}

message CreateUserRequest {
    string username = 1;
    string password = 2;
}

message CreateUserResponse {
    string user_uuid = 1; // uuid
    repeated types.v1.UserRole user_roles = 2;
}