syntax = "proto3";

package order.v1;

option go_package = "github.com/nullableocean/grpcservices/api/gen/order/v1;orderv1";

import "models/money.proto";
import "models/decimal.proto";
import "models/order.proto";

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

service Order {
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    rpc GetOrderStatus(GetStatusRequest) returns (GetStatusResponse);
    rpc StreamOrderUpdates(GetUpdatesRequest) returns (stream UpdatesResponse);
}

message GetStatusRequest {
    string order_uuid = 1 [(validate.rules).string = {uuid: true}];
    string user_uuid  = 2 [(validate.rules).string = {uuid: true}];
}

message GetUpdatesRequest {
    string order_uuid = 1 [(validate.rules).string = {uuid: true}];
    string user_uuid  = 2 [(validate.rules).string = {uuid: true}];
}

message GetStatusResponse {
    models.v1.OrderStatus status = 1;
}

message UpdatesResponse {
    models.v1.OrderStatus status = 1;
    models.v1.OrderStatus old_status = 2;
    google.protobuf.Timestamp updated_at = 3;
}

message CreateOrderRequest {
    string user_uuid = 1 [(validate.rules).string = {uuid: true}];
    string market_uuid = 2 [(validate.rules).string = {uuid: true}];
    models.v1.OrderType order_type = 3 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
    models.v1.OrderSide order_side = 4 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
    models.v1.Money price = 5 [(validate.rules).message = {required: true}];
    models.v1.Decimal quantity = 6 [(validate.rules).message = {required: true}];
    string idempotency_key = 7 [(validate.rules).string = {uuid: true}];
}

message CreateOrderResponse {
    string order_uuid = 1;
    models.v1.OrderStatus status = 2;
}