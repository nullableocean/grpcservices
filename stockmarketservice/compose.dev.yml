services:
  stockmarketapp:
    container_name: stockmarketapp
    build:
      context: ../
      dockerfile: stockmarketservice/build/Dockerfile.dev
    volumes:
      - "./logs:/app/logs"
    expose:
      - "${SERVER_PORT}"
      - "${METRICS_PORT}"
    env_file: 
      - ./.env
    networks:
      - monitoringnet
      - grpcservices
      - brokernet
    healthcheck:
       test: ["CMD", "curl", "-f", "http://localhost:${METRICS_PORT}/health"]
       interval: 30s
       timeout: 15s
       retries: 5
       start_period: 15s
    restart: on-failure:3
    labels:
      - promtail_logs=true

networks:
  monitoringnet:
    external: true
    name: monitoringnet
  grpcservices:
    external: true
    name: grpcservices
  brokernet:
    external: true
    name: brokernet