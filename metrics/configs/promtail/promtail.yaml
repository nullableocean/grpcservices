server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml    # запоминает от куда читать дальше

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # читаем с контейнеров с лейблом promtail_logs=true
      - source_labels: ['__meta_docker_container_label_promtail_logs']
        regex: 'true'
        action: keep

      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
    pipeline_stages:
          - json:
              expressions:
                level: level
                msg: message
                xrequestid: xrequestid
          - labels:
              level: level
          - template:
              source: message
              template: '{{ .xrequestid }} {{ .msg }}'