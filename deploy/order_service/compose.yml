services:
  order_service:
    build:
      context: ../../
      dockerfile: deploy/order_service/Dockerfile
    container_name: order_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
      - "${METRICS_PORT}:${METRICS_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet
      - order
    labels:
      - promtail_logs=true

  postgres:
    image: postgres:15-alpine
    container_name: order_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DBNAME}
    expose:
      - "5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DBNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
      - order

  migrator:
    image: migrate/migrate
    container_name: order_migrator
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../order_service/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${PG_USER}:${PG_PASS}@${PG_HOST}:${PG_PORT}/${PG_DBNAME}?sslmode=disable",
      "up"
    ]
    networks:
      - order
    restart: "no"

networks:
  appnet:
    external: true
  order:
    driver: bridge

volumes:
  order_postgres_data: