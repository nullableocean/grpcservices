services:
  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    mem_limit: 64m                        
    mem_reservation: 32m
    volumes:
      - ./configs/promtail/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro 
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      loki:
        condition: service_started
    networks:
      - monitoringnet
      - appnet

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    # mem_limit: 512m
    # mem_reservation: 128m
    expose:
      - "3100"
    volumes:
      - ./configs/loki/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoringnet
      - appnet

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    networks:
      - monitoringnet
      - appnet
    mem_limit: 512m

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_LOGIN}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS}
      - GF_FEATURE_TOGGLES_ENABLE=accessControlOnCall
      - GF_INSTALL_PLUGINS=https://storage.googleapis.com/integration-artifacts/grafana-lokiexplore-app/grafana-lokiexplore-app-latest.zip;grafana-lokiexplore-app
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoringnet
      - appnet
    depends_on:
      - prometheus

  tempo:
    image: grafana/tempo:2.6.0
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml"]
    volumes:
      - ./configs/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    user: "0:0" # опасно, default 10001:10001, тогда нужно создать volume под этого юзера, иначе ошибки доступа при запуске контейнера
    ports:
      - "3200:3200"
      - "4317:4317"    # OTLP gRPC
    networks:
      - monitoringnet
      - appnet
    mem_limit: 1g

networks:
  monitoringnet:
    driver: bridge
    name: monitoringnet
  appnet:
    external: true

volumes:
  prom_data:
  grafana_data:
  loki_data:
  tempo_data: