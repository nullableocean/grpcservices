version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.2
    container_name: elasticsearch
    environment:
      - "discovery.type=single-node"
      - "ES_JAVA_OPTS=-Xms${ES_MEM_LIMIT} -Xmx${ES_MEM_LIMIT}"
      - "xpack.security.enabled=false"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - elk
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD} -s --fail http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.2
    container_name: kibana
    environment:
      - "ELASTICSEARCH_HOSTS=http://elasticsearch:9200"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "curl -s --fail http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.18.2
    container_name: filebeat
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    command: filebeat -e --strict.perms=false
    depends_on:
      - elasticsearch
      - kibana
    networks:
      - elk
      - appnet

volumes:
  es_data:
    driver: local

networks:
  elk:
    driver: bridge
  appnet:
    external: true